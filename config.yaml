# Setu configuration.
#
# Behaviour lives in code; this file supplies only instance data. See the README
# ("Config reference") for full details.

# Listener. Defaults to port 80 on all interfaces; binding to 80 needs privilege
# (run as root or grant CAP_NET_BIND_SERVICE). Fields (all optional):
#   interface  bind address; blank = all interfaces. "127.0.0.1" = loopback only.
#   socket     Unix socket path to serve on instead of TCP (tunnel-only;
#              overrides interface/port).
#   tls        own/self-signed cert for HTTPS — needed so browsers treat the LAN
#              address as a secure context and allow PWA install + offline. Set
#              both cert and key (PEM paths) to enable; omit for plain HTTP (as
#              before). No ACME; Tailscale is the zero-config HTTPS alternative.
# Reach it by hostname (e.g. http://setu.lan) via your router's DNS — see README.
listen:
  port: 80
  # tls:
  #   cert: certs/setu.pem
  #   key:  certs/setu-key.pem

auth:
  # Bearer token required on /api and /ws. CHANGE THIS before any real use.
  token: "CHANGE_ME"

# How often to re-read device state (Go duration string, e.g. 5s, 500ms, 1m).
poll_interval: 5s

# Configured devices. MAC is the PRIMARY, stable identity; IP is an optional
# hint/fallback that Setu resolves from the MAC at runtime (ARP / brand discovery).
devices:
  - id: bedroom_light
    brand: WiZ
    model: color_bulb         # driver key (Signify/WiZ A60, hw model 23110) — see docs/devices/wiz.md
    series: "A60"             # friendly product name shown in the UI (the bulb's form factor)
    name: "Bedroom Light"
    mac: "d8:a0:11:ff:5e:f0"  # WiZ bulb (from getPilot result.mac)
    ip: 192.168.0.140         # hint; WiZ broadcast discovery also finds it by MAC

  - id: living_tv
    brand: Samsung
    model: tizen              # driver key (hw model UA50AU7700KLXL) — see docs/devices/samsung.md
    series: "AU7700"          # friendly product/series name shown in the UI
    name: "Living Room TV"
    # WoL/resolution MAC (verified to wake this unit). NOTE: the TV's on-screen
    # info shows a different MAC (1c:86:9a:05:e1:4c) — its other interface; don't
    # swap this one, it's the one that works. See docs/devices/samsung.md.
    mac: "a0:d7:f3:9e:74:b2"  # used for Wake-on-LAN + IP resolution
    ip: 192.168.0.100         # hint/fallback
    # First control attempt: the TV shows an "Allow" prompt — accept it once;
    # the pairing token is then cached (see README → Samsung TV).
